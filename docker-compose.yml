version: "3.9"

services:
  mailmind:
    build: .
    image: mailmind:latest
    container_name: mailmind
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      # Mount credentials so they're not baked into the image
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./results:/app/results

    environment:
      OPENAI_API_KEY:          ${OPENAI_API_KEY}
      GOOGLE_CLIENT_ID:        ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:    ${GOOGLE_CLIENT_SECRET}
      CLICKUP_API_TOKEN:       ${CLICKUP_API_TOKEN}
      CLICKUP_LIST_ID:         ${CLICKUP_LIST_ID}
      GOOGLE_SHEET_ID:         ${GOOGLE_SHEET_ID}
      WEBHOOK_SECRET:          ${WEBHOOK_SECRET}
      LANGFUSE_PUBLIC_KEY:     ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY:     ${LANGFUSE_SECRET_KEY}
      LANGFUSE_HOST:           ${LANGFUSE_HOST:-https://cloud.langfuse.com}
      LOG_LEVEL:               ${LOG_LEVEL:-INFO}
      GMAIL_POLL_INTERVAL_SECONDS: ${GMAIL_POLL_INTERVAL_SECONDS:-30}

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/webhooks/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
